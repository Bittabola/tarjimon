name: Auto PR Review

on:
  push:
    branches-ignore: [main]

env:
  FORGEJO_URL: ${{ github.server_url }}/api/v1
  REPO: ${{ github.repository }}
  MAX_AUTOFIX: 3

concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: docker
    container:
      image: python:3.13-slim
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      # ── Setup ──────────────────────────────────────────
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends bash git curl jq ca-certificates gnupg

      - name: Install Node.js 20
        run: |
          mkdir -p /etc/apt/keyrings
          curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
            | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
          echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" \
            > /etc/apt/sources.list.d/nodesource.list
          apt-get update
          apt-get install -y --no-install-recommends nodejs

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Checkout repository
        shell: bash
        env:
          AUTO_MERGE_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
        run: |
          REGISTRY="${GITHUB_SERVER_URL#https://}"
          git clone --branch "$GITHUB_REF_NAME" \
            "https://oauth2:${AUTO_MERGE_TOKEN}@${REGISTRY}/${GITHUB_REPOSITORY}.git" .
          git fetch origin main

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt ruff

      - name: Configure git
        run: |
          git config user.name "autofix-bot"
          git config user.email "autofix@noreply"
          git config --global --add safe.directory "$(pwd)"

      - name: Prepare Claude user
        run: |
          useradd -m -s /bin/bash reviewer
          cp -r /root/.npm /home/reviewer/.npm 2>/dev/null || true
          mkdir -p /home/reviewer/.claude
          echo '{"hasCompletedOnboarding":true}' > /home/reviewer/.claude.json
          chown -R reviewer:reviewer /home/reviewer
          runuser -u reviewer -- git config --global --add safe.directory "$(pwd)"

      # ── Iteration guard ────────────────────────────────
      - name: Check autofix iteration count
        id: iteration
        shell: bash
        run: |
          COUNT=$(git log --oneline origin/main..HEAD | grep -cE '\[(autofix|ruff-fix)' || true)
          echo "COUNT=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Autofix iteration: ${COUNT}/${MAX_AUTOFIX}"
          if [ "$COUNT" -ge "$MAX_AUTOFIX" ]; then
            echo "EXHAUSTED=true" >> "$GITHUB_OUTPUT"
          else
            echo "EXHAUSTED=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if max retries exhausted
        if: steps.iteration.outputs.EXHAUSTED == 'true'
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          TEXT=$(printf '*Autofix exhausted* (%s/%s) -- `%s`\nBranch: `%s`\nManual fix needed.' \
            "${{ steps.iteration.outputs.COUNT }}" "$MAX_AUTOFIX" "$REPO_NAME" "$GITHUB_REF_NAME")
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$TEXT" \
              '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}')"
          exit 1

      # ── Lint & test ────────────────────────────────────
      - name: Ruff auto-fix
        if: steps.iteration.outputs.EXHAUSTED == 'false'
        run: ruff check --fix . || true

      - name: Lint check
        id: lint
        if: steps.iteration.outputs.EXHAUSTED == 'false'
        shell: bash
        run: |
          if ruff check . > /tmp/lint_errors.txt 2>&1; then
            echo "OK=true" >> "$GITHUB_OUTPUT"
          else
            echo "OK=false" >> "$GITHUB_OUTPUT"
            echo "Lint errors found:"
            cat /tmp/lint_errors.txt
          fi

      - name: Run tests
        id: tests
        if: steps.iteration.outputs.EXHAUSTED == 'false'
        shell: bash
        run: |
          if pytest -q > /tmp/test_errors.txt 2>&1; then
            echo "OK=true" >> "$GITHUB_OUTPUT"
          else
            echo "OK=false" >> "$GITHUB_OUTPUT"
            echo "Test failures found:"
            cat /tmp/test_errors.txt
          fi

      - name: Check for uncommitted changes
        id: dirty
        if: steps.iteration.outputs.EXHAUSTED == 'false'
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "CHANGED=false" >> "$GITHUB_OUTPUT"
          else
            echo "CHANGED=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Decide path ────────────────────────────────────
      - name: Determine action
        id: path
        if: steps.iteration.outputs.EXHAUSTED == 'false'
        shell: bash
        run: |
          if [ "${{ steps.lint.outputs.OK }}" = "false" ] || [ "${{ steps.tests.outputs.OK }}" = "false" ]; then
            echo "ACTION=fix" >> "$GITHUB_OUTPUT"
            echo "Path: fix (lint/test errors found)"
          elif [ "${{ steps.dirty.outputs.CHANGED }}" = "true" ]; then
            echo "ACTION=ruff-commit" >> "$GITHUB_OUTPUT"
            echo "Path: ruff-commit (ruff auto-fixed files, all checks pass)"
          else
            echo "ACTION=review" >> "$GITHUB_OUTPUT"
            echo "Path: review (all clean)"
          fi

      - name: Set repo ownership for Claude
        if: steps.path.outputs.ACTION == 'fix' || steps.path.outputs.ACTION == 'review'
        run: find . -path ./.git -prune -o -exec chown reviewer:reviewer {} +

      # ── PATH A: Fix lint/test errors ───────────────────
      - name: Claude auto-fix lint/test errors
        if: steps.path.outputs.ACTION == 'fix'
        shell: bash
        run: |
          cat > /tmp/fix_prompt.txt <<'PROMPT_END'
          You are a senior Python developer. Fix the following errors in this Python/FastAPI Telegram bot codebase.

          PROMPT_END

          if [ "${{ steps.lint.outputs.OK }}" = "false" ] && [ -s /tmp/lint_errors.txt ]; then
            echo "LINT ERRORS:" >> /tmp/fix_prompt.txt
            cat /tmp/lint_errors.txt >> /tmp/fix_prompt.txt
            printf '\n' >> /tmp/fix_prompt.txt
          fi

          if [ "${{ steps.tests.outputs.OK }}" = "false" ] && [ -s /tmp/test_errors.txt ]; then
            echo "TEST FAILURES:" >> /tmp/fix_prompt.txt
            cat /tmp/test_errors.txt >> /tmp/fix_prompt.txt
            printf '\n' >> /tmp/fix_prompt.txt
          fi

          cat >> /tmp/fix_prompt.txt <<'PROMPT_END'

          Instructions:
          - Fix all lint errors and test failures
          - Do not change functionality, only fix the errors
          - Run 'ruff check .' after your fixes to verify lint passes
          - Run 'pytest -q' after your fixes to verify tests pass
          - Do NOT run any git commands (git add, git commit, git push, etc.) — staging and committing is handled externally
          PROMPT_END

          chown reviewer:reviewer /tmp/fix_prompt.txt

          runuser -u reviewer -- claude -p \
            --model sonnet \
            --max-turns 10 \
            --allowedTools "Read,Edit,Write,Grep,Glob,Bash" \
            --dangerously-skip-permissions \
            --no-session-persistence \
            - < /tmp/fix_prompt.txt

      - name: Commit and push lint/test fixes
        if: steps.path.outputs.ACTION == 'fix'
        shell: bash
        run: |
          N=$(( ${{ steps.iteration.outputs.COUNT }} + 1 ))
          git add -u
          UNTRACKED=$(git ls-files --others --exclude-standard)
          if [ -n "$UNTRACKED" ]; then
            echo "::warning::Claude created new files that won't be committed: $UNTRACKED"
          fi
          if git diff --cached --quiet; then
            echo "Claude made no changes — fix attempt failed"
            exit 1
          fi
          git commit -m "[autofix ${N}/${MAX_AUTOFIX}] fix lint/test errors"
          git push origin "$GITHUB_REF_NAME"

      # ── PATH B: Commit ruff auto-fixes ─────────────────
      - name: Commit ruff auto-fixes
        if: steps.path.outputs.ACTION == 'ruff-commit'
        shell: bash
        run: |
          git add -u
          UNTRACKED=$(git ls-files --others --exclude-standard)
          if [ -n "$UNTRACKED" ]; then
            echo "::warning::Claude created new files that won't be committed: $UNTRACKED"
          fi
          git commit -m "[ruff-fix] auto-format"
          git push origin "$GITHUB_REF_NAME"

      # ── PATH C: Review ─────────────────────────────────
      - name: Create or find PR
        id: pr
        if: steps.path.outputs.ACTION == 'review'
        shell: bash
        env:
          AUTO_MERGE_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
        run: |
          BRANCH="$GITHUB_REF_NAME"
          PR_NUMBER=$(curl -s \
            -H "Authorization: token ${AUTO_MERGE_TOKEN}" \
            "${FORGEJO_URL}/repos/${REPO}/pulls?state=open&head=${REPO%%/*}:${BRANCH}" \
            | jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(curl -s -X POST \
              -H "Authorization: token ${AUTO_MERGE_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg title "Auto: ${BRANCH}" \
                --arg head "$BRANCH" \
                --arg base "main" \
                --arg body "Automated PR for branch \`${BRANCH}\`." \
                '{title: $title, head: $head, base: $base, body: $body}')" \
              "${FORGEJO_URL}/repos/${REPO}/pulls" \
              | jq '.number')
          fi
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "ERROR: Failed to get or create PR"
            exit 1
          fi
          echo "PR_NUMBER=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "BRANCH=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Claude review
        id: claude
        if: steps.path.outputs.ACTION == 'review'
        shell: bash
        run: |
          git diff origin/main...HEAD > /tmp/diff.txt
          chown reviewer:reviewer /tmp/diff.txt

          REVIEW_SCHEMA='{"type":"object","properties":{"verdict":{"type":"string","enum":["APPROVED","CHANGES_REQUESTED"]},"summary":{"type":"string"},"issues":{"type":"array","items":{"type":"object","properties":{"severity":{"type":"string","enum":["critical","warning","suggestion"]},"file":{"type":"string"},"description":{"type":"string"}},"required":["severity","description"]}}},"required":["verdict","summary","issues"]}'

          cat > /tmp/review_prompt.txt <<'PROMPT_END'
          You are a senior code reviewer. Review the following git diff for a Python/FastAPI Telegram bot application (translation and YouTube summary service).

          Focus on:
          - Bugs, logic errors, security issues (critical)
          - Performance problems, bad practices (warning)
          - Style improvements, minor suggestions (suggestion)

          VERDICT RULES (strict):
          - If you find ANY critical or warning-level issues, you MUST set verdict to CHANGES_REQUESTED.
          - Only set verdict to APPROVED if there are zero critical and zero warning issues.
          - Suggestions alone do NOT block approval.

          Here is the diff:
          PROMPT_END
          cat /tmp/diff.txt >> /tmp/review_prompt.txt
          chown reviewer:reviewer /tmp/review_prompt.txt

          RESULT=$(runuser -u reviewer -- claude -p \
            --model opus \
            --output-format json \
            --json-schema "$REVIEW_SCHEMA" \
            --max-turns 6 \
            --allowedTools "Read,Grep,Glob" \
            --dangerously-skip-permissions \
            --no-session-persistence \
            - < /tmp/review_prompt.txt)

          STRUCTURED=$(echo "$RESULT" | jq -r '.structured_output // empty')
          if [ -z "$STRUCTURED" ] || [ "$STRUCTURED" = "null" ]; then
            echo "ERROR: Claude returned no structured output. Raw result:"
            echo "$RESULT"
            exit 1
          fi

          VERDICT=$(echo "$STRUCTURED" | jq -r '.verdict // empty')
          if [ -z "$VERDICT" ]; then
            echo "ERROR: No verdict in structured output"
            exit 1
          fi

          SUMMARY=$(echo "$STRUCTURED" | jq -r '.summary // ""')

          echo "VERDICT=${VERDICT}" >> "$GITHUB_OUTPUT"

          echo "$STRUCTURED" | jq -c '.issues' > /tmp/review_issues.json
          chown reviewer:reviewer /tmp/review_issues.json

          {
            if [ "$VERDICT" = "APPROVED" ]; then
              printf '## Approved\n\n'
            else
              printf '## Changes Requested\n\n'
            fi
            printf '%s\n\n' "$SUMMARY"

            for severity in critical warning suggestion; do
              COUNT=$(echo "$STRUCTURED" | jq -r "[.issues[] | select(.severity==\"${severity}\")] | length")
              if [ "$COUNT" -gt 0 ]; then
                case "$severity" in
                  critical)   printf '### Critical\n' ;;
                  warning)    printf '### Warnings\n' ;;
                  suggestion) printf '### Suggestions\n' ;;
                esac
                while IFS= read -r issue; do
                  FILE=$(echo "$issue" | jq -r '.file // "general"')
                  DESC=$(echo "$issue" | jq -r '.description')
                  printf -- '- **%s**: %s\n' "$FILE" "$DESC"
                done < <(echo "$STRUCTURED" | jq -c ".issues[] | select(.severity==\"${severity}\")")
                printf '\n'
              fi
            done
          } > /tmp/pr_comment.txt

      - name: Post PR comment
        if: steps.path.outputs.ACTION == 'review'
        shell: bash
        env:
          AUTO_MERGE_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.PR_NUMBER }}
        run: |
          PAYLOAD=$(jq -n --rawfile body /tmp/pr_comment.txt '{body: $body}')
          HTTP_CODE=$(curl -s -o /tmp/comment_resp.txt -w '%{http_code}' -X POST \
            -H "Authorization: token ${AUTO_MERGE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${FORGEJO_URL}/repos/${REPO}/issues/${PR_NUMBER}/comments")
          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Failed to post PR comment (HTTP ${HTTP_CODE})"
            cat /tmp/comment_resp.txt
            exit 1
          fi
          echo "PR comment posted successfully"

      - name: Merge PR (if approved)
        if: steps.claude.outputs.VERDICT == 'APPROVED'
        shell: bash
        env:
          AUTO_MERGE_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.PR_NUMBER }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/merge_resp.txt -w '%{http_code}' -X POST \
            -H "Authorization: token ${AUTO_MERGE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"Do":"squash","delete_branch_after_merge":true}' \
            "${FORGEJO_URL}/repos/${REPO}/pulls/${PR_NUMBER}/merge")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Failed to merge PR (HTTP ${HTTP_CODE})"
            cat /tmp/merge_resp.txt
            exit 1
          fi
          echo "PR merged successfully"

      # ── PATH C2: Review rejected → Claude fixes → push ─
      - name: Claude auto-fix review issues
        if: steps.claude.outputs.VERDICT == 'CHANGES_REQUESTED'
        shell: bash
        run: |
          cat > /tmp/fix_prompt.txt <<'PROMPT_END'
          You are a senior Python developer. A code review found the following issues in this Python/FastAPI Telegram bot codebase. Fix them.

          REVIEW ISSUES:
          PROMPT_END

          cat /tmp/review_issues.json >> /tmp/fix_prompt.txt

          cat >> /tmp/fix_prompt.txt <<'PROMPT_END'

          Instructions:
          - Fix all critical and warning-level issues
          - You may address suggestions if they are trivial, but focus on critical/warning
          - Do not change unrelated functionality
          - Run 'ruff check .' after your fixes to verify lint passes
          - Run 'pytest -q' after your fixes to verify tests pass
          PROMPT_END

          chown reviewer:reviewer /tmp/fix_prompt.txt

          runuser -u reviewer -- claude -p \
            --model sonnet \
            --max-turns 10 \
            --allowedTools "Read,Edit,Write,Grep,Glob,Bash" \
            --dangerously-skip-permissions \
            --no-session-persistence \
            - < /tmp/fix_prompt.txt

      - name: Commit and push review fixes
        if: steps.claude.outputs.VERDICT == 'CHANGES_REQUESTED'
        shell: bash
        run: |
          N=$(( ${{ steps.iteration.outputs.COUNT }} + 1 ))
          git add -u
          UNTRACKED=$(git ls-files --others --exclude-standard)
          if [ -n "$UNTRACKED" ]; then
            echo "::warning::Claude created new files that won't be committed: $UNTRACKED"
          fi
          if git diff --cached --quiet; then
            echo "Claude made no changes — fix attempt failed"
            exit 1
          fi
          git commit -m "[autofix ${N}/${MAX_AUTOFIX}] address review feedback"
          git push origin "$GITHUB_REF_NAME"

      # ── Failure notification ───────────────────────────
      - name: Notify on failure
        if: failure() && steps.iteration.outputs.EXHAUSTED != 'true'
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          TEXT=$(printf '*Auto-fix failed* -- `%s`\nBranch: `%s`\n[View run](https://git.fayzullaev.ca/%s/actions)' \
            "$REPO_NAME" "$GITHUB_REF_NAME" "$GITHUB_REPOSITORY")
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$TEXT" \
              '{chat_id: $chat_id, text: $text, parse_mode: "Markdown"}')"
